# Better prefix (like screen / easier reach)
unbind C-b
set -g prefix `
bind ` send-prefix

# Split panes (intuitive)
bind v split-window -h
bind s split-window -v

# Easier pane navigation
bind h select-pane -L
bind l select-pane -R
bind k select-pane -U
bind j select-pane -D

# Easier resize
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r K resize-pane -U 5
bind -r J resize-pane -D 5

bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3

# Status bar base
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-bg "#111111"
set -g status-fg "#ffffff"

# Clean left/right
set -g status-left ""
set -g status-right ""

# Inactive windows: white text on dark background
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#ffffff,bg=#111111]  #I:#W  "

# Active window: white text on yellow background
setw -g window-status-current-format "#[fg=#f6e3a8,bg=#2563eb,bold]  #I:#W  "


# Clean left/right sections
set -g status-left ""
set -g status-right "#[fg=#22c55e] [ %Y-%m-%d %H:%M:%S ] "

# Window list
setw -g window-status-separator ""

# Window with bell/activity (optional)
setw -g window-status-activity-style "fg=#f9e2af,bg=#1e1e2e,bold"

set -g window-style "bg=#111111"
set -g window-active-style "bg=#111111"
set -g pane-active-border-style "fg=#22c55e"

# Messages
set -g message-style "fg=#1e1e2e,bg=#a6e3a1,bold"

# Disable auto rename so your manual names stay
set -g automatic-rename off
set -g allow-rename off

# Mouse
set -g mouse on

# Reload shortcut
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

